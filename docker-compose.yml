services:
  frontend:
    build: 
      context: ./frontend/
    volumes: 
      - ./frontend:/usr/app 
    ports: 
      - 4200:4200
    depends_on: 
      - backend

  backend:
    build: 
      context: ./backend/
    ports: 
      - 3000:3000
    volumes: 
      - ./backend:/app
    depends_on: 
      - db

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    env_file:
      - ./backend/.env
